<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — SCC</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <style>
    :root{--bg:#ffffff;--ink:#0a0a0a;--muted:rgba(10,10,10,.50);--dim:rgba(10,10,10,.26);--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;--sans:Helvetica,Arial,ui-sans-serif,system-ui,-apple-system,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;letter-spacing:-0.02em;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
    .code{font-weight:900;letter-spacing:-.08em;font-size:clamp(80px,15vw,160px);line-height:1;}
    .msg{font-size:16px;color:var(--muted);margin:12px 0 32px;line-height:1.5;}
    .btn{border:1.5px solid var(--ink);border-radius:2px;padding:10px 24px;font-size:13px;font-weight:800;letter-spacing:-.01em;display:inline-flex;align-items:center;justify-content:center;background:var(--ink);color:#fff;text-decoration:none;font-family:inherit;transition:background .14s;}
    .btn:hover{background:#2a2a2a;}
    .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:48px;}
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg">This page doesn't exist. Maybe it did once, or maybe you mistyped something.</p>
  <a class="btn" href="/">← Back to SCC</a>
  <p class="sub">Social Chicago Collective · Culture Systems Studio</p>
</body>
</html>
